      position: absolute;
      left: 0;
      top: 0;
    }

      }

      overflow: hidden;
      display: inline-block;
    }

    .pre-default-word-con {
      margin-top: 6vw;

    .pre-default-word-con>ul {
      box-sizing: border-box;
      display: flex;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .pre-default-word-con>ul>li {
      list-style: none;
      display: inline-block;
      background-color: #f8f8f9;
      border-radius: 1.6vw;
      height: 4.8vw;
      margin-right: 4vw;
    }

    .pre-skt_con {
      overflow: hidden;
      position: relative;
      display: block;
      transform: translate3D(0, 0, 0);
    }

    .pre-skt_con:empty::after {
      content: "";
      display: block;
      position: absolute;
      left: 0;
      width: 150%;
      height: 100%;
      transform: translateX(-100%);
      background: linear-gradient(90deg, #f8f8f9 1%, #ededed 30%, #ededed 70%, #f8f8f9 99%);
      animation: skeleton-5ca7aa2a 4s infinite;
    }

    .pre-discovery-con {
      margin-top: 5.06667vw;
    }

    .pre-con {
      display: flex;
      flex-direction: column;
    }

    .pre-con .pre-title {

      height: 5.86667vw;

      border-radius: 1.6vw;
      margin-bottom: 6.93333vw;
    }

    .pre-discovery-con li {

    .pre-con ul li p {

      height: 4.8vw;
      background: #f8f8f9;
      border-radius: 1.6vw;
    }

    .pre-con ul {

    .pre-hot-search-con li span:nth-of-type(2) {

    .pre-guess-like-con {

    .pre-guess-like-con ul {

    .pre-guess-like-con ul li {
